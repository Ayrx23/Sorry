<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ashnna ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(270deg,#ff4d6d,#8a2be2,#1e90ff);
background-size:600% 600%;
animation:bg 12s infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.app{
width:95%;
max-width:420px;
height:85vh;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
border-radius:20px;
overflow:hidden;
display:flex;
flex-direction:column;
}

.header{
background:#ff4d6d;
padding:15px;
text-align:center;
font-weight:600;
}

.screen{
flex:1;
padding:20px;
overflow-y:auto;
text-align:center;
}

.hidden{
display:none;
}

button{
padding:12px 18px;
margin:6px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

.primary{
background:#ff4d6d;
color:white;
}

.secondary{
background:white;
color:black;
}

/* typing */

.cursor{
border-right:2px solid white;
animation:blink 1s infinite;
}

@keyframes blink{
0%,100%{border-color:transparent}
50%{border-color:white}
}

/* whatsapp chat */

.chat{
text-align:left;
margin-top:10px;
}

.msg{
padding:8px 12px;
margin:8px 0;
border-radius:12px;
max-width:80%;
font-size:14px;
}

.me{
background:#ff4d6d;
margin-left:auto;
}

.her{
background:#333;
}

/* music */

.music{
position:absolute;
top:15px;
right:15px;
}

/* hearts */

.heart{
position:absolute;
color:#ff4d6d;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

</style>
</head>

<body>

<button class="music primary" onclick="toggleMusic()">🎵</button>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2023/03/06/audio_1c9d1c68aa.mp3">
</audio>

<div id="hearts"></div>

<div class="app">

<div class="header">For Ashnna ❤️</div>

<!-- VERSION 1 INTRO -->

<div class="screen" id="s1">

<h2 id="typing"></h2>

<p>I made something for you.</p>

<button class="primary" onclick="show('s2')">Continue</button>

</div>

<!-- VERSION 2 CHOICES -->

<div class="screen hidden" id="s2">

<h3>How are you feeling?</h3>

<button class="secondary" onclick="startChat('mad')">Still mad 😤</button>

<button class="secondary" onclick="startChat('hurt')">Just hurt 🥺</button>

<button class="secondary" onclick="startChat('curious')">Just curious 🤔</button>

</div>

<!-- VERSION 3 CHAT -->

<div class="screen hidden" id="chatScreen">

<h3>Chat</h3>

<div class="chat" id="chat"></div>

<br>

<button class="primary" onclick="show('final')">Continue</button>

</div>

<!-- FINAL -->

<div class="screen hidden" id="final">

<h3>One last question</h3>

<p>Will you still accept me as your boyfriend?</p>

<button class="primary" onclick="show('yes')">Yes ❤️</button>

<button class="secondary" onclick="show('talk')">Let's talk first</button>

</div>

<div class="screen hidden" id="yes">

<h2>Thank you ❤️</h2>

<p>I promise I'll treat you better.</p>

</div>

<div class="screen hidden" id="talk">

<h3>That's fair</h3>

<p>I'm ready to listen whenever you want.</p>

</div>

</div>

<script>

/* navigation */

function show(id){

document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

}

/* typing effect */

const text="Ashnna Jaiswal ❤️"

let i=0

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i)

i++

setTimeout(type,90)

}

}

type()

/* floating hearts */

function heart(){

const h=document.createElement("div")

h.className="heart"

h.innerHTML="❤"

h.style.left=Math.random()*100+"vw"

h.style.fontSize=Math.random()*20+15+"px"

document.body.appendChild(h)

setTimeout(()=>{h.remove()},6000)

}

setInterval(heart,500)

/* music */

function toggleMusic(){

const m=document.getElementById("music")

m.paused?m.play():m.pause()

}

/* smart chat */

function startChat(type){

show("chatScreen")

const chat=document.getElementById("chat")

chat.innerHTML=""

let messages=[]

if(type==="mad"){

messages=[

"I know you're probably mad.",

"And honestly I understand why.",

"The prank was stupid.",

"I'm really sorry Ashnna."

]

}

if(type==="hurt"){

messages=[

"I can tell you're hurt.",

"And I hate that I caused that.",

"You matter to me.",

"I won't do something like that again."

]

}

if(type==="curious"){

messages=[

"Okay good you're curious.",

"I made this because you deserve effort.",

"And because I'm genuinely sorry."

]

}

let index=0

function send(){

if(index<messages.length){

const msg=document.createElement("div")

msg.className="msg me"

msg.innerText=messages[index]

chat.appendChild(msg)

index++

setTimeout(send,1200)

}

}

send()

}

</script>

</body>
</html>
